name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - name: Release Please
        uses: googleapis/release-please-action@v4
        with:
          # Use a PAT or GitHub App token so Release Please PR updates trigger CI.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
